name: Gemma4App
options:
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.tczhong.Gemma4App
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: NO
    CODE_SIGN_ENTITLEMENTS: Gemma4App/Gemma4App.entitlements
packages:
  mlx-swift:
    path: Vendor/mlx-swift
  InferenceKit:
    path: Vendor/InferenceKit
  swift-transformers:
    url: https://github.com/huggingface/swift-transformers.git
    from: 1.1.9
targets:
  Gemma4App:
    type: application
    platform: iOS
    sources:
      - path: Gemma4App/App
      - path: Gemma4App/UI
      - path: Gemma4App/Runtime
      - path: Vendor/Gemma4Runtime/LLM
      - path: Vendor/Gemma4Runtime/Shared/L10n.swift
      - path: Vendor/Gemma4Runtime/Shared/LanguageService.swift
      - path: Vendor/Gemma4Runtime/Shared/PCLog.swift
      - path: Vendor/Gemma4Runtime/Shared/Audio/ASRBackend.swift
    dependencies:
      - package: mlx-swift
        product: MLX
      - package: mlx-swift
        product: MLXNN
      - package: mlx-swift
        product: MLXFast
      - package: mlx-swift
        product: MLXOptimizers
      - package: InferenceKit
        product: MLXLLM
      - package: InferenceKit
        product: MLXVLM
      - package: InferenceKit
        product: MLXLMCommon
      - package: swift-transformers
        product: Tokenizers
    info:
      path: Gemma4App/Info.plist
      properties:
        NSCameraUsageDescription: 需要使用相机拍照并识别图片内容。
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
        UIStatusBarStyle: UIStatusBarStyleDefault
        ASL_API_BASE_URL: http://127.0.0.1:8000
        HF_TOKEN: ""
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_NAME: $(TARGET_NAME)
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/Frameworks"
schemes:
  Gemma4App:
    build:
      targets:
        Gemma4App: all
